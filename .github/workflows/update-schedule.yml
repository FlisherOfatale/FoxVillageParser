name: Update Competition Schedule

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run parser
        run: node parser.js

      - name: Verify output
        run: |
          if [ ! -f docs/schedule.json ]; then
            echo "Error: docs/schedule.json was not created"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git add docs/ schedule.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "🤖 Auto-update competition schedule - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
